services:
  - type: web
    name: adedas-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    # Health check path - backend has /api/health endpoint
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
          value: production
        - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: WHATSAPP_ADMIN_PHONE
        value: "+2348036262488"
      # Update this to your Vercel frontend URL after deployment
      - key: FRONTEND_URL
        value: "https://your-frontend.vercel.app"

databases:
  - name: adedas-postgres
    databaseName: adedas
    user: adedas
    # Database will be created automatically - you can set password in Render dashboard
